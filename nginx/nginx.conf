# Nginx reverse proxy configuration for the embedded screen example.
#
# PURPOSE:
# This configuration models the TWO-GATEWAY architecture of the real system:
#
#   CDP Gateway  (port 80  / localhost:3000) — SFD portal
#   CAPD Gateway (port 81  / localhost:3019) — Siti Agri SSO bridge + Agrigate UI
#
# In the real system, the SFD service is deployed on CDP (Common Development
# Platform) behind the CDP API gateway, while the Siti Agri SSO bridge and
# Agrigate UI remain on the existing CAPD (Common Application Development
# Platform) infrastructure behind a separate gateway.
#
# This means iframes in the SFD portal load content from a DIFFERENT origin
# (the CAPD gateway domain). The browser enforces cross-origin restrictions:
#   - The portal's CSP must include frame-src for the CAPD gateway origin
#   - Siti Agri responses must include frame-ancestors for the CDP gateway origin
#   - Cookies set by Siti Agri need SameSite=None; Secure (in production/HTTPS)
#
# TWO-GATEWAY ROUTING:
#
# CDP Gateway (port 80 → SFD portal):
#   /*              → portal (GOV.UK frontend pages)
#
# CAPD Gateway (port 81 → Siti Agri infrastructure):
#   /sso-bridge/*   → siti-agri-stub (iframe content — SSO bridge + screens)
#   /api/*          → siti-agri-stub (facade API for debugging/transparency)

events {
    worker_connections 1024;
}

http {
    upstream portal {
        server portal:3001;
    }

    upstream siti_agri_stub {
        server siti-agri-stub:3002;
    }

    # -------------------------------------------------------------------------
    # CDP Gateway — SFD portal (port 80 → localhost:3000)
    #
    # This represents the CDP API gateway that the new SFD service sits behind.
    # Only routes portal traffic — does NOT serve Siti Agri content.
    # The SSO bridge lives on the separate CAPD gateway below.
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name localhost;

        # All requests go to the SFD portal (GOV.UK frontend).
        # Note: /sso-bridge/ is NOT routed here — it's on the CAPD gateway.
        # The portal's iframe src URLs point to the CAPD gateway origin
        # (localhost:3019), making the iframe cross-origin from the portal.
        location / {
            proxy_pass http://portal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # -------------------------------------------------------------------------
    # CAPD Gateway — Siti Agri infrastructure (port 81 → localhost:3019)
    #
    # This represents the existing CAPD gateway that the Siti Agri SSO bridge
    # and Agrigate UI sit behind. The SFD portal's iframes load content from
    # this gateway — creating a cross-origin relationship with the portal.
    #
    # Cross-origin requirements:
    # - Siti Agri responses must set: Content-Security-Policy: frame-ancestors
    #   'self' http://localhost:3000 (the CDP gateway origin)
    # - The SFD portal must set: Content-Security-Policy: frame-src 'self'
    #   http://localhost:3019 (this CAPD gateway origin)
    # -------------------------------------------------------------------------
    server {
        listen 81;
        server_name localhost;

        # SSO bridge — the iframe src URL the portal embeds.
        # In production, the real SSO bridge sits behind the CAPD gateway.
        location /sso-bridge/ {
            proxy_pass http://siti_agri_stub;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Facade API — portal calls this backend-to-backend via Docker DNS,
        # but it's also exposed through the CAPD gateway for transparency.
        location /api/ {
            proxy_pass http://siti_agri_stub;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
